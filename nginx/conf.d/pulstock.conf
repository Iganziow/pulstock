# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.pulstock.cl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API (Django) en Hetzner ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.pulstock.cl;

    ssl_certificate     /etc/letsencrypt/live/api.pulstock.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pulstock.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Static files servidos por Nginx (más rápido que Gunicorn)
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Rate limit extra en login
    location /api/auth/token/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://api:8000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location / {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://api:8000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
